<!DOCTYPE html>
<html lang="en">
<head>
    <title></title>
</head>
<body>
    
    <button onclick="myfunc()">Click Me</button>
    <script type ="text/javascript">
        function myfunc(){
            // window.location = "https://www.youtube.com/";
            window.location.assign("https://www.youtube.com/");
        }
    </script>



</body>

<!-- The location object contains information about the current URL. The lication object is a part of the window object .
     It is accessed through the window.location.property
     
     Window location href (header reference)
     The window.location.href property returns the URL of the current page
     window.location.href

     window Location Hostname
     The window.location.hostname property returns the name of the internet host (of the current page).

     window location pathname
     The window.location.pathname property returns the pathname of the current page.

     window location protocol
     the window.location.protocol property returns the web protocol of the page

     window location assign
     the window.location.assign() method loads a new document
     -->
