<!-- Javascripts interaction with HTML is handled through events that occur when the user or the browser manipulates a page.
Events are a part of the document object model level 3 and every HTML element contains a set of events which can trigger javascript code

when the page loads , it is called an event. When the user clicks a button , that click too is an event. Other examples include events like 
pressing any key , closing a window. resizing a window etc.


onclick
onmousehover and onmouseout
onkeydown script Script runs when the key is pressed
onkeypress script Script runs when the key is pressed and released
onkeyup script runs when key is released 

twitter = 00aced
fb = 3b5999;
whatsapp = 25d366
youtube = cd201f -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>welcome to my channel :) keep smiling and loving</h1>
    <!-- <button onmousedown="mytwitter()">Click me</button> -->
    <button onkeydown="mytwitter()">Click me</button>
    <!-- <button onmouseenter="myfacebook()">Click me</button> -->
    <button onkeyup="myfacebook()">Click me</button>
    <!-- <button onmouseup="myyoutube()">Click me</button> -->
    <button onmouseup="myyoutube()">Click me</button>
    <button onmouseout="mywhatsapp()">Click me</button>
    <script type = "text/javascript">
        function myyoutube(){
            document.body.style.backgroundColor = '#cd201f';
            document.body.style.color = 'white';
        }

        function mytwitter(){
            document.body.style.backgroundColor = '#00aced';
            document.body.style.color = 'white';
        }

        function myfacebook(){
            document.body.style.backgroundColor = '#3b5999';
            document.body.style.color = 'white';
        }

        function mywhatsapp(){
            document.body.style.backgroundColor = '#25d366';
            document.body.style.color = 'white';
        }
    </script>
</body>
</html>
